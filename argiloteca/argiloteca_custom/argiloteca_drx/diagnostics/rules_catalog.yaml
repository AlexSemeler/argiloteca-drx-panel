version: argiloteca.drx.ngc.v3
policy: argiloteca_rule_based_diagnostic
catalog_status: semantic_catalog_not_runtime_loader
runtime_note: >
  Este catalogo documenta e normaliza as regras usadas pelo painel DRX.
  Na versao atual, a execucao principal ainda ocorre em Python
  (diagnostic_decision_tree.py, diagnostic_peak_rules.py, peak_sets.py e
  drx_ngc_workflow.py) e no JSON estatico diagnostic_peak_rules_catalog.json.
  O proximo passo tecnico e transformar este YAML em fonte executavel unica.

source_scope:
  source_book: X-Ray Diffraction and the Identification and Analysis of Clay Minerals
  chapter_3: "Diffraction I: Geometry"
  chapter_7: "Identification and Quantitative Analysis of Clay Minerals"
  chapter_8: "Identification of Mixed-Layered Clay Minerals"
  additional_references:
    - Brindley & Brown, 1980
    - Bailey, 1980/1988
    - Moore & Reynolds, 1989/1997
    - Drits & Tchoubar, 1990
    - Lanson & Bouchet, 1995
    - Meunier, Clays, 2005
    - Fluxograma USGS para identificacao de argilominerais por DRX
    - Referencias empiricas Pre-Sal UFRGS/Petrobras

units:
  d_spacing: angstrom
  two_theta: degree
  intensity: arbitrary_counts_or_normalized
  default_radiation_policy: >
    Nao assumir CuKalpha silenciosamente. d-spacing so deve ser calculado
    quando lambda/radiation estiver explicito nos metadados.

global_policy:
  no_single_peak_confirmation: true
  required_logic:
    - comparar tratamentos N/G/C quando disponiveis
    - usar picos companheiros para reduzir falso positivo
    - separar mistura fisica de interestratificacao
    - registrar ambiguidades e competidores
    - tratar d060 como evidencia auxiliar
    - preservar o difratograma bruto/curva lida
  confidence_scope: >
    Confirmacao limitada ao escopo das regras DRX N/G/C da Argiloteca.
    Nao substitui validacao mineralogica completa, quimica, FTIR, microscopia
    ou modelagem estrutural.

preparations:
  natural:
    aliases: [N, natural, air_dried, air-dried, air dried]
  glycolated:
    aliases: [G, glicolado, glicolada, EG, ethylene_glycol_solvated]
  calcined:
    aliases: [C, calcinado, calcinada, heated, aquecido]

named_ranges:
  illite_10a: {d_min: 9.73, d_max: 10.38, source_rule: chapter7_illite_glauconite_mica}
  illite_10a_n: {d_min: 9.84, d_max: 10.36, source_rule: chapter7_illite_glauconite_mica}
  illite_10a_g: {d_min: 9.82, d_max: 10.30, source_rule: chapter7_illite_glauconite_mica}
  illite_10a_c: {d_min: 9.73, d_max: 10.38, source_rule: chapter7_illite_glauconite_mica}
  illite_5a: {d_min: 4.85, d_max: 5.15, source_rule: chapter7_illite_glauconite_mica}
  illite_3_33a: {d_min: 3.26, d_max: 3.40, source_rule: chapter7_quartz_internal_standard}

  kaolinite_7a: {d_min: 6.96, d_max: 7.42, source_rule: chapter7_kaolinite_chlorite_resolution}
  kaolinite_7a_n: {d_min: 6.97, d_max: 7.42, source_rule: chapter7_kaolinite_chlorite_resolution}
  kaolinite_7a_g: {d_min: 6.96, d_max: 7.42, source_rule: chapter7_kaolinite_chlorite_resolution}
  kaolinite_7a_c_check: {d_min: 6.96, d_max: 7.42, source_rule: chapter7_kaolinite_chlorite_resolution}
  kaolinite_3_57a: {d_min: 3.52, d_max: 3.62, source_rule: chapter7_kaolinite_chlorite_resolution}

  smectite_n: {d_min: 13.46, d_max: 16.86, source_rule: chapter7_smectite_ngc}
  smectite_g: {d_min: 16.06, d_max: 18.31, source_rule: chapter7_smectite_ngc}
  smectite_c: {d_min: 9.65, d_max: 10.37, source_rule: chapter7_smectite_ngc}

  chlorite_14a: {d_min: 13.58, d_max: 14.87, source_rule: chapter7_chlorite_ool}
  chlorite_14a_n: {d_min: 13.74, d_max: 14.74, source_rule: chapter7_chlorite_ool}
  chlorite_14a_g: {d_min: 13.83, d_max: 14.72, source_rule: chapter7_chlorite_ool}
  chlorite_14a_c: {d_min: 13.58, d_max: 14.87, source_rule: chapter7_chlorite_ool}
  chlorite_7a: {d_min: 6.90, d_max: 7.40, source_rule: chapter7_chlorite_ool}
  chlorite_4_72a: {d_min: 4.60, d_max: 4.85, source_rule: chapter7_chlorite_ool}
  chlorite_3_53a: {d_min: 3.45, d_max: 3.65, source_rule: chapter7_chlorite_ool}

  quartz_101: {d_min: 3.24, d_max: 3.44, target: 3.34, source_rule: chapter7_quartz_internal_standard}
  quartz_100: {d_min: 4.23, d_max: 4.35, source_rule: chapter7_quartz_internal_standard}

  sepiolite_12a: {d_min: 12.00, d_max: 12.50, source_rule: chapter7_fibrous_channel_minerals}
  palygorskite_10_5a: {d_min: 10.30, d_max: 10.50, source_rule: chapter7_fibrous_channel_minerals}
  kerolite_9_4a: {d_min: 9.35, d_max: 9.50, source_rule: presalt_magnesian_clays_reference}

  vermiculite_14a: {d_min: 13.70, d_max: 14.80, source_rule: chapter7_vermiculite_operational}
  vermiculite_collapse: {d_min: 10.00, d_max: 12.00, source_rule: chapter7_vermiculite_operational}

  corrensite_n_29a: {d_min: 28.50, d_max: 29.80, source_rule: chapter8_corrensite_ordered_chlorite_smectite}
  corrensite_g_31a: {d_min: 30.80, d_max: 32.20, source_rule: chapter8_corrensite_ordered_chlorite_smectite}
  corrensite_c_24a: {d_min: 23.50, d_max: 24.80, source_rule: chapter8_corrensite_ordered_chlorite_smectite}

  d060_candidate: {d_min: 1.485, d_max: 1.555, source_rule: chapter7_d060_auxiliary}
  d060_dioctahedral: {d_min: 1.488, d_max: 1.505, source_rule: chapter7_d060_dioctahedral}
  d060_trioctahedral: {d_min: 1.535, d_max: 1.555, source_rule: chapter7_d060_trioctahedral}

peak_sets:
  illite_mica:
    context: Pico 10 A estavel deve ser lido com suporte de 5 A e cuidado com quartzo em 3.33-3.34 A.
    ranges: [illite_10a, illite_5a, illite_3_33a]
  kaolin_group:
    context: 7 A + 3.57 A sao suporte; resposta termica diferencia caulinita de clorita/serpentina/halloysita.
    ranges: [kaolinite_7a, kaolinite_3_57a]
  chlorite_group:
    context: 14/7/4.72/3.53 A persistentes favorecem clorita; 14 A isolado e ambiguo.
    ranges: [chlorite_14a, chlorite_7a, chlorite_4_72a, chlorite_3_53a]
  smectite_group:
    context: Diagnostico exige trajetoria N-G-C, nao pico isolado.
    ranges: [smectite_n, smectite_g, smectite_c]
  sepiolite:
    context: Pico 12-12.5 A estavel e auxiliar; morfologia/hkl sao requeridos.
    ranges: [sepiolite_12a]
  palygorskite:
    context: Pico 10.3-10.5 A compete com ilita/mica e halloysita 10 A.
    ranges: [palygorskite_10_5a]
  kerolite_talc:
    context: Pico 9.4 A nao expansivo requer contexto magnesiano/quimica para aumentar confianca.
    ranges: [kerolite_9_4a]
  corrensite:
    context: Sequencia regular clorita/esmectita; usar padrao 00l* e comportamento entre tratamentos.
    ranges: [corrensite_n_29a, corrensite_g_31a, corrensite_c_24a, chlorite_7a]

rules:
  - id: smectite_ngc
    target: smectite_group
    family: smectite_group
    context:
      scientific_basis: Capitulo 7; esmectita 2:1 expansiva.
      dashboard_use: Ranking N/G/C, candidatos por comportamento e triagem.
      interpretation: Expansao com glicolacao e colapso termico para ~10 A.
    required_behavior: [expands_with_glycol, collapses_after_heating]
    natural_A: [13.46, 16.86]
    glycolated_A: [16.06, 18.31]
    heated_A: [9.65, 10.37]
    companions_A: []
    competitors:
      - vermiculite: 14 A natural pode sobrepor sem expansao completa.
      - chlorite_smectite: Interestratificados podem mostrar expansao parcial.
    source_rules: [chapter7_smectite_ngc]
    source_locator:
      - {chapter: 7, page: 241, figure: "7.8", source_rule: chapter7_smectite_ngc, fragment: glycol}
    limitations:
      - Nao confirmar por pico glicolado isolado.
      - Se coexistir 14 A persistente, reportar mistura/interestratificado possivel.

  - id: trioctahedral_smectite
    target: saponite_or_stevensite
    family: smectite_group
    context:
      scientific_basis: Meunier + d060 auxiliar + contexto Mg/Pre-Sal.
      dashboard_use: Refinamento auxiliar de esmectita expansiva.
      interpretation: Esmectita expansiva com suporte trioctaedrico/Mg.
    required_behavior: [expands_with_glycol, collapses_after_heating]
    required_auxiliary: [d060_trioctahedral_or_intermediate, Mg_or_presalt_context]
    competitors:
      - saponite: exige quimica Mg-Al.
      - stevensite: reforcada por contexto Pre-Sal/lacustre/evaporitico.
    source_rules: [chapter7_d060_trioctahedral, presalt_magnesian_clays_reference]
    source_locator:
      - {chapter: 7, page: 245, table: "7.4", source_rule: chapter7_d060_trioctahedral, fragment: "060"}
      - {chapter: local_context, page: null, source_rule: presalt_magnesian_clays_reference, fragment: presalt_magnesian_clays, validation_status: local_empirical_context}
    limitations:
      - d060 nao confirma especie sozinho.
      - Exige quimica para separar saponita e estevensita.

  - id: dioctahedral_smectite
    target: montmorillonite_or_nontronite
    family: smectite_group
    context:
      scientific_basis: Meunier + d060 auxiliar.
      dashboard_use: Refinamento auxiliar de esmectita expansiva.
      interpretation: Esmectita expansiva com d060 proximo da faixa dioctaedrica.
    required_behavior: [expands_with_glycol, collapses_after_heating]
    required_auxiliary: [d060_dioctahedral]
    source_rules: [chapter7_d060_dioctahedral]
    source_locator:
      - {chapter: 7, page: 245, table: "7.4", source_rule: chapter7_d060_dioctahedral, fragment: "060"}
    limitations:
      - Separar montmorillonita/nontronita exige quimica.

  - id: chlorite_ngc
    target: chlorite
    family: chlorite_group
    context:
      scientific_basis: Capitulo 7; clorita 2:1:1 nao expansiva.
      dashboard_use: Ranking N/G/C, candidatos por comportamento, picos companheiros.
      interpretation: 14 A persiste em N/G/C sem expansao para ~17 A.
    required_behavior: [stable_after_glycol, persists_after_heating]
    natural_A: [13.74, 14.74]
    glycolated_A: [13.83, 14.72]
    heated_A: [13.58, 14.87]
    companions_A:
      - [6.90, 7.40]
      - [4.60, 4.85]
      - [3.45, 3.65]
    competitors:
      - vermiculite: 14 A sem expansao pode sobrepor; aquecimento/glicerol/K ajudam.
      - smectite: esmectita expande para ~17 A no glicolado.
      - kaolin_group: pico 7 A sobrepoe clorita 002.
    source_rules: [chapter7_chlorite_ool]
    source_locator:
      - {chapter: 7, page: 234, figure: "7.4", source_rule: chapter7_chlorite_ool, fragment: chlorite}
    limitations:
      - 14 A isolado nao confirma clorita.
      - Se houver expansao parcial, manter chlorite/smectite como diferencial.

  - id: dioctahedral_chlorite
    target: dioctahedral_chlorite
    family: chlorite_group
    context:
      scientific_basis: d060 auxiliar aplicado a comportamento cloritico.
      dashboard_use: Refinamento auxiliar quando clorita e candidata.
      interpretation: Clorita-like com d060 na faixa dioctaedrica.
    required_behavior: [chlorite_ngc]
    required_auxiliary: [d060_dioctahedral]
    source_rules: [chapter7_d060_dioctahedral, chapter7_chlorite_ool]
    source_locator:
      - {chapter: 7, page: 245, table: "7.4", source_rule: chapter7_d060_dioctahedral, fragment: "060"}
      - {chapter: 7, page: 234, figure: "7.4", source_rule: chapter7_chlorite_ool, fragment: chlorite}
    limitations:
      - Requer quimica e padrao hkl/po randomico.

  - id: vermiculite_flow
    target: vermiculite
    family: vermiculite_group
    context:
      scientific_basis: Capitulo 7; janela 14 A operacional.
      dashboard_use: Competidor de clorita/esmectita no resumo N/G/C.
      interpretation: 14 A nao expande claramente e colapsa parcial/totalmente para 10-12 A apos aquecimento.
    natural_A: [13.70, 14.80]
    glycolated_A: [13.70, 14.80]
    heated_A: [10.00, 12.00]
    required_behavior: [limited_or_no_glycol_expansion, heating_collapse]
    competitors:
      - chlorite: persiste em 14 A apos aquecimento.
      - smectite: expande para ~17 A em EG.
    source_rules: [chapter7_vermiculite_operational]
    source_locator:
      - {chapter: 7, page: 240, figure: "7.7", source_rule: chapter7_vermiculite_operational, fragment: glycerol}
    limitations:
      - Hipotese provisoria; usar glicerol, K-saturacao e aquecimento moderado.

  - id: illite_mica_ngc
    target: illite_mica
    family: illite_mica
    context:
      scientific_basis: Capitulo 7; mineral 2:1 nao expansivo.
      dashboard_use: Ranking N/G/C e regra-fonte.
      interpretation: Reflexao ~10 A permanece estavel em N/G/C.
    required_behavior: [stable_after_glycol, persists_after_heating]
    natural_A: [9.84, 10.36]
    glycolated_A: [9.82, 10.30]
    heated_A: [9.73, 10.38]
    companions_A:
      - [4.85, 5.15]
      - [3.26, 3.40]
    competitors:
      - quartz: 3.33-3.34 A pode ser quartzo; exigir 10 A e preferencialmente 5 A.
      - palygorskite: 10.5 A pode sobrepor em baixa resolucao.
      - collapsed_smectite: esmectita calcinada colapsa perto de 10 A.
    source_rules: [chapter7_illite_glauconite_mica, chapter7_quartz_internal_standard]
    source_locator:
      - {chapter: 7, page: 233, figure: "7.3", source_rule: chapter7_illite_glauconite_mica, fragment: illite}
      - {chapter: 7, page: 227, source_rule: chapter7_quartz_internal_standard, fragment: quartz}
    limitations:
      - 3.33 A isolado nao deve ser usado como ilita.

  - id: biotite_flow
    target: biotite
    family: illite_mica
    context:
      scientific_basis: mica trioctaedrica com d060 auxiliar.
      dashboard_use: Competidor/refinamento quando ilita/mica e d060 trioctaedrico coexistem.
      interpretation: Pico 10 A mica-like com d060 perto de 1.54 A.
    required_behavior: [illite_mica_ngc]
    required_auxiliary: [d060_trioctahedral]
    source_rules: [chapter7_d060_trioctahedral]
    source_locator:
      - {chapter: 7, page: 245, table: "7.4", source_rule: chapter7_d060_trioctahedral, fragment: "060"}
    limitations:
      - Exige quimica e padrao de po; quartzo pode interferir perto de 1.54 A.

  - id: chapter7_kaolin_heat_loss
    target: kaolin_group
    family: kaolin_group
    context:
      scientific_basis: Brindley & Brown + Capitulo 7.
      dashboard_use: Candidatos por comportamento, ambiguidades 7 A.
      interpretation: Pico 7 A permanece no glicolado e desaparece/reduz fortemente no aquecimento.
    required_behavior: [stable_after_glycol, disappears_or_strongly_reduces_after_heating]
    natural_A: [6.97, 7.42]
    glycolated_A: [6.96, 7.42]
    heated_A_check: [6.96, 7.42]
    companions_A:
      - [3.52, 3.62]
    competitors:
      - chlorite: tambem contribui em 7 A; deve ter 14/4.72/3.53 A.
      - serpentine: tambem ocorre perto de 7 A e pode persistir.
      - halloysite: requer testes como formamida/DMSO quando aplicavel.
    source_rules: [chapter7_kaolinite_chlorite_resolution]
    source_locator:
      - {chapter: 7, page: 234, source_rule: chapter7_kaolinite_chlorite_resolution, fragment: "550C kaolinite chlorite"}
      - {chapter: 7, page: 247, table: "7.6", source_rule: chapter7_kaolinite_chlorite_resolution, fragment: kaolin}
    limitations:
      - Retornar grupo da caulinita, nao especie kaolinite/dickite/nacrite sem hkl/morfologia.

  - id: kerolite_presalt
    target: kerolite
    family: talc_kerolite_group
    context:
      scientific_basis: Meunier + referencias empiricas Pre-Sal.
      dashboard_use: Hipotese auxiliar magnesiana.
      interpretation: Pico 9.35-9.45/9.50 A nao expansivo; contexto Mg/Pre-Sal fortalece.
    natural_A: [9.35, 9.45]
    glycolated_A: [9.35, 9.50]
    required_behavior: [non_expandable_9_4a]
    context_required_or_supportive: [presalt, magnesian_clays, Mg]
    competitors:
      - talc: exige cristalinidade e quimica.
      - illite_mica: fase 10 A pode ficar proxima em baixa resolucao.
    source_rules: [presalt_magnesian_clays_reference]
    source_locator:
      - {chapter: local_context, page: null, source_rule: presalt_magnesian_clays_reference, fragment: kerolite_presalt, validation_status: local_empirical_context}
    limitations:
      - Nao confirmar sem quimica Mg-Al-Fe/contexto.

  - id: sepiolite_flow
    target: sepiolite
    family: fibrous_channel
    context:
      scientific_basis: Capitulo 7; minerais fibrosos/canais.
      dashboard_use: Candidato por conjunto de picos e ambiguidades 12 A.
      interpretation: Pico 12-12.5 A nao expande com glicolacao.
    natural_A: [12.00, 12.50]
    glycolated_A: [12.00, 12.50]
    required_behavior: [stable_after_glycol]
    source_rules: [chapter7_fibrous_channel_minerals]
    source_locator:
      - {chapter: 7, page: 244, table: "7.3", source_rule: chapter7_fibrous_channel_minerals, fragment: fibrous}
    limitations:
      - N/G/C sozinho e auxiliar; requer morfologia/hkl.

  - id: palygorskite_flow
    target: palygorskite
    family: fibrous_channel
    context:
      scientific_basis: Capitulo 7; minerais fibrosos/canais.
      dashboard_use: Competidor de fases 10 A.
      interpretation: Pico 10.3-10.5 A nao expande com glicolacao.
    natural_A: [10.30, 10.50]
    glycolated_A: [10.30, 10.50]
    required_behavior: [stable_after_glycol]
    competitors:
      - illite_mica: 10 A estavel pode sobrepor.
      - halloysite_10a: pode competir na janela 10 A.
    source_rules: [chapter7_fibrous_channel_minerals]
    source_locator:
      - {chapter: 7, page: 244, table: "7.3", source_rule: chapter7_fibrous_channel_minerals, fragment: fibrous}
    limitations:
      - Requer morfologia fibrosa e hkl adicionais.

  - id: serpentine_flow
    target: serpentine
    family: serpentine_group
    context:
      scientific_basis: Meunier + Capitulo 7; mineral 1:1 trioctaedrico.
      dashboard_use: Ambiguidade 7 A; impede chamar todo 7 A de caulinita.
      interpretation: 7 A nao expansivo com d060 trioctaedrico.
    natural_A: [6.90, 7.40]
    glycolated_A: [6.90, 7.40]
    heated_A: [6.90, 7.40]
    required_auxiliary: [d060_trioctahedral]
    competitors:
      - kaolin_group: compartilha 7 A.
      - chlorite: compartilha 7 A como 002.
    source_rules: [chapter7_d060_trioctahedral]
    source_locator:
      - {chapter: 7, page: 245, table: "7.4", source_rule: chapter7_d060_trioctahedral, fragment: "060"}
    limitations:
      - Requer morfologia/hkl; 7 A isolado e ambiguo.

  - id: corrensite_regular_cs
    target: corrensite
    family: mixed_layer
    context:
      scientific_basis: Capitulo 8; interestratificacao ordenada clorita/esmectita.
      dashboard_use: Interestratificados, ranking N/G/C e resumo de evidencias.
      interpretation: Sequencia racional 00l* e comportamento compativel com clorita/esmectita ordenada.
    natural_A: [28.50, 29.80]
    glycolated_A: [30.80, 32.20]
    heated_A: [23.50, 24.80]
    behavior: [rational_sequence, ordered_chlorite_smectite]
    source_rules: [chapter8_corrensite_ordered_chlorite_smectite]
    source_locator:
      - {chapter: 8, page: null, figure: "8.9-8.11", source_rule: chapter8_corrensite_ordered_chlorite_smectite, fragment: corrensite, validation_status: requires_manual_page_verification}
    limitations:
      - Nao reportar mineral puro sem alertar interestratificacao.
      - Comparar padrao 00l completo; nao usar pico unico.

  - id: illite_smectite_or_random_mixed_layer
    target: illite_smectite_or_random_mixed_layer
    family: mixed_layer
    context:
      scientific_basis: Capitulo 8; interestratificados I/S e principios de Mering.
      dashboard_use: Interestratificados e competidor de illite/smectite discretas.
      interpretation: Expansao parcial, bandas largas ou ombros devem ser tratados como evidencia de interestratificacao.
    behavior: [partial_expansion_with_glycol, broad_or_shoulder]
    source_rules: [chapter8_physical_mixture_vs_interstratification, chapter8_mering_principles]
    source_locator:
      - {chapter: 8, page: null, figure: "8.1-8.8", source_rule: chapter8_physical_mixture_vs_interstratification, fragment: illite_smectite_partial_expansion, validation_status: requires_manual_page_verification}
      - {chapter: 8, page: null, section: "Mering principles", source_rule: chapter8_mering_principles, fragment: broadening, validation_status: requires_manual_page_verification}
    limitations:
      - Distinguir mistura fisica de interestratificacao exige padrao 00l completo e tratamentos comparativos.

  - id: chlorite_smectite_mixed_layer
    target: chlorite_smectite
    family: mixed_layer
    context:
      scientific_basis: Capitulo 8; C/S, corrensita e clorita expansiva.
      dashboard_use: Competidor quando coexistem resposta expansiva e 14 A preservado.
      interpretation: Componentes cloriticos persistentes e expansivos coexistem.
    behavior: [partial_expansion_with_glycol, chlorite_like_persistence]
    source_rules: [chapter8_chlorite_smectite_behavior, chapter8_corrensite_differential]
    source_locator:
      - {chapter: 8, page: null, figure: "8.12-8.15", source_rule: chapter8_chlorite_smectite_behavior, fragment: chlorite_smectite, validation_status: requires_manual_page_verification}
      - {chapter: 8, page: null, section: "Chlorite/smectite", source_rule: chapter8_corrensite_differential, fragment: corrensite_differential, validation_status: requires_manual_page_verification}
    limitations:
      - Se EG nao expande claramente, clorita/vermiculita e C/S podem permanecer indeterminados sem glicerol/Mg/K.

  - id: quartz_internal_standard
    target: quartz
    family: non_clay_interference
    context:
      scientific_basis: Capitulo 7; quartzo como padrao/interferencia.
      dashboard_use: Proveniencia e limitacoes; evita falso positivo de ilita por 3.33 A.
      interpretation: 3.33-3.34 A deve ser tratado como quartzo quando acompanhado por 4.23-4.35 A.
    diagnostic_A:
      quartz_101: [3.24, 3.44]
      quartz_100: [4.23, 4.35]
    source_rules: [chapter7_quartz_internal_standard]
    source_locator:
      - {chapter: 7, page: 227, source_rule: chapter7_quartz_internal_standard, fragment: quartz}
      - {chapter: 7, page: 251, table: "7.8B", source_rule: chapter7_quartz_internal_standard, fragment: low_quartz}
    limitations:
      - Nao usar 3.33-3.34 A sozinho como evidencia de ilita/mica.

  - id: d060_auxiliary_external_curve
    target: octahedral_classification
    family: auxiliary_060
    context:
      scientific_basis: Capitulo 7; d060 auxiliar dioctaedrico/trioctaedrico.
      dashboard_use: Pre-classificacao de amostras externas N/G/C.
      interpretation: d060 e inferido apenas se houver pico entre 1.485 e 1.555 A.
    candidate_A: [1.485, 1.555]
    dioctahedral_A: [1.488, 1.505]
    trioctahedral_A: [1.535, 1.555]
    source_rules: [chapter7_d060_auxiliary]
    source_locator:
      - {chapter: 7, page: 245, table: "7.4", source_rule: chapter7_d060_auxiliary, fragment: "060"}
    limitations:
      - Evidencia auxiliar, nunca confirmatoria.
      - Requer lambda/eixo confiavel e faixa angular cobrindo 060.
      - Verificar montagem em po randomico e interferencia de quartzo perto de 1.541 A.

ambiguity_rules:
  - window: "7 A"
    candidates: [kaolinite, chlorite, serpentine, halloysite, dickite, nacrite]
    context: Usar comportamento termico, 14/4.72/3.53 A, 3.57 A, formamida/DMSO e morfologia quando necessario.
  - window: "10 A"
    candidates: [illite_mica, halloysite_10a, palygorskite, collapsed_smectite, illite_smectite, kerolite]
    context: Estabilidade N/G/C favorece ilita/mica; calcinado de esmectita tambem colapsa perto de 10 A.
  - window: "12 A"
    candidates: [sepiolite, Na_smectite, palygorskite_shoulder, one_water_layer_smectite]
    context: Sepiolita/paligorsquita exigem morfologia/hkl; smectita depende de tratamento/intercamada.
  - window: "14 A"
    candidates: [chlorite, vermiculite, Mg_Ca_smectite, swelling_chlorite, corrensite_partial]
    context: Separar por EG, glicerol, K-saturacao, aquecimento e picos companheiros.
  - window: "3.33-3.34 A"
    candidates: [illite, quartz]
    context: Quartzo deve ser checado por 4.26/4.29 A; nao usar sozinho para ilita.
  - window: "d060/quartz 1.54 A"
    candidates: [trioctahedral_d060, quartz]
    context: Verificar quartzo antes de usar como suporte trioctaedrico.

recommended_tests:
  common: [FTIR, padrao_de_po_randomico, validacao_por_especialista]
  seven_A_ambiguity: [aquecimento_controlado_400_550C, formamida_ou_DMSO, verificar_clorita_003_004]
  fourteen_A_ambiguity: [glicerol, K_saturacao, aquecimento_300C_1h]
  d060_unknown: [medir_refinar_reflexao_060]
  magnesian_context: [quimica_Mg_Al_Fe, saturacao_Mg_K, modelagem_de_interestratificados]
  fibrous_or_serpentine: [microscopia_morfologia]

runtime_mapping:
  python:
    diagnostic_decision_tree.py:
      - interpret_ngc
      - _build_candidates
      - _recommended_tests
    diagnostic_peak_rules.py:
      - named_ranges
      - workflow_diagnostic_ranges
      - targeted_basal_ranges
      - peak_sets
    peak_sets.py:
      - evaluate_peak_sets
    drx_ngc_workflow.py:
      - build_ngc_workflow
      - interpret_ngc integration
    views.py:
      - external_curve_preclassification
      - d060 auxiliary inference for external uploads
  frontend:
    drx-comparacao.js:
      - renderDiagnosticV3Block
      - renderNgcPrincipalRanking
      - renderExternalRawMergedNgcPanel
      - diagnostic_peak_rules_catalog hydration
    diagnostic_peak_rules_catalog.json:
      - named_ranges
      - peak_sets
      - frontend_mineral_reflection_rules

chapter7_knowledge_mirror:
